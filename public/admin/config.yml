backend:
  name: git-gateway
  branch: main

media_library:
  name: cloudinary
  config:
    cloud_name: PUBLIC_CLOUDINARY_CLOUD_NAME   # Replace with your actual Cloudinary cloud name
   

collections:
  - name: products
    label: Products
    folder: src/content/products
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: name, widget: string }
      - { label: "Price (USD)", name: price, widget: number }
      - { label: "Description", name: description, widget: text }
      - { label: "SKU", name: sku, widget: string }
      - { label: "Stock", name: stock, widget: number, default: 0 }
      - { label: "Category", name: category, widget: string }
      - { label: "Subcategory", name: subcategory, widget: string }
      - { label: "Sub‑Subcategory", name: subSubcategory, widget: string }
      - { label: "Brand", name: brand, widget: string }
      - label: "Images"
        name: images
        widget: list
        field: { label: "Image", name: image, widget: image }