<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hardware Store CMS</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
  DecapCMS.init({
    config: {
      backend: {
        name: "git-gateway",
        branch: "main"
      },
      media_library: {
        name: "cloudinary",
        config: {
          cloud_name: import.meta.env.PUBLIC_CLOUDINARY_CLOUD_NAME,
          api_key: import.meta.env.PUBLIC_CLOUDINARY_API_KEY
        }
      },
      collections: [
        {
          name: "products",
          label: "Products",
          folder: "src/content/products",
          create: true,
          slug: "{{slug}}",
          fields: [
            { label: "Product Name", name: "name", widget: "string" },
            { label: "Price (USD)", name: "price", widget: "number" },
            { label: "Description", name: "description", widget: "text" },
            { label: "SKU", name: "sku", widget: "string" },
            { label: "Stock", name: "stock", widget: "number", default: 0 },
            {
              label: "Category",
              name: "category",
              widget: "select",
              options: ["Electrical", "Hardwares", "Paints", "Plumbing", "Sanitary Ware"]
            },
            {
              label: "Subcategory",
              name: "subcategory",
              widget: "select",
              options: []  // Will be dynamically populated? For simplicity, keep as free text or use a list.
            },
            {
              label: "Sub‑Subcategory",
              name: "subSubcategory",
              widget: "select",
              options: []
            },
            {
              label: "Brand",
              name: "brand",
              widget: "select",
              options: []  // You can later fill with your brand list from JSON
            },
            { label: "Images", name: "images", widget: "list", field: { label: "Image", name: "image", widget: "image" } }
          ]
        }
      ]
    }
  });
</script>
</body>
</html>
